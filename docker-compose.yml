services:
  postgres:
    image: postgres:16-alpine
    container_name: fwe-postgres
    environment:
      POSTGRES_USER: fwe
      POSTGRES_PASSWORD: fwe_password
      POSTGRES_DB: fwe
    ports:
      - "5432:5432"
    volumes:
      - fwe-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fwe -d fwe"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fwe-postgres:
